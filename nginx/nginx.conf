 events {
    # Determines how many simultaneous connections a single worker process can handle.
    worker_connections 1024;
}

http {
    # Define the backend servers (Our Spring Cloud Gateway)
    upstream api_gateway {
        # host.docker.internal allows the Docker container to reach your Mac's localhost
        server host.docker.internal:8080;
    }

    server {
        # Listen on standard HTTP port
        listen 80;
        server_name localhost;

        # Route all requests to the upstream gateway
        location / {
            proxy_pass http://api_gateway;
            
            # Pass original client headers so the Gateway knows who is actually calling
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}