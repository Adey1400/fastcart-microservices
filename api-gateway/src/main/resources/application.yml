server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: product-service-route
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/products/**

        - id: order-service-route
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/orders/**