server:
  port: 8080

spring:
  application:
    name: api-gateway

  security:
    jwt:
      secret: ${SECRET_KEY}

  cloud:
    gateway:
      routes:
        - id: product-service-route
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/products/**

        - id: order-service-route
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - AuthenticationFilter


        - id: auth-service-route
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - AuthenticationFilter